<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="50%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="cartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Letter "F" - bold, modern, NOT Facebook style -->
  <text
    x="10"
    y="46"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="900"
    font-size="42"
    fill="white"
    letter-spacing="-2"
  >F</text>

  <!-- Shopping cart icon - bottom right -->
  <g transform="translate(34, 30)">
    <!-- Cart basket -->
    <path
      d="M4 4L6 16H22L25 6H8"
      stroke="url(#cartGrad)"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
    <!-- Cart wheels -->
    <circle cx="9" cy="20" r="2.2" fill="#FCD34D"/>
    <circle cx="20" cy="20" r="2.2" fill="#FCD34D"/>
    <!-- Cart handle -->
    <path
      d="M1 1L4 4"
      stroke="url(#cartGrad)"
      stroke-width="2.5"
      stroke-linecap="round"
    />
  </g>

  <!-- Small sparkle dot - top right accent -->
  <circle cx="54" cy="10" r="2.5" fill="#FCD34D" opacity="0.8"/>
  <circle cx="50" cy="6" r="1.2" fill="#FCD34D" opacity="0.5"/>
</svg>